<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas — Monthly KPIs</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
<style>
  :root {
    --bg: #0a0e14; --panel: #11161f; --panel-2: #161d29; --border: #1f2937;
    --text: #e5eaf2; --muted: #8b96a8; --accent: #4cc2ff;
    --green: #4ade80; --amber: #fbbf24; --red: #f87171;
    --s1: #3987e5;  /* new members */
    --s2: #199e70;  /* TRT initials */
    --s3: #c98500;  /* peptide initials */
    --radius: 14px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    --mono: "SF Mono", "Cascadia Code", Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh;
    background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(76,194,255,0.08), transparent); }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 60px; }
  header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
  .greeting h1 { font-size: 1.9rem; font-weight: 650; letter-spacing: -0.02em; }
  .greeting h1 .accent { color: var(--accent); }
  .greeting p { color: var(--muted); margin-top: 4px; font-size: 0.95rem; }
  nav a { color: var(--accent); text-decoration: none; font-size: 0.9rem; margin-left: 14px; }
  nav a:hover { text-decoration: underline; }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; margin-bottom: 18px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; min-width: 0; }
  .panel h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600; margin-bottom: 14px; }
  .big { font-family: var(--mono); font-size: 1.75rem; font-weight: 600; }
  .sub { color: var(--muted); font-size: 0.8rem; margin-top: 6px; line-height: 1.45; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 8px; font-size: 0.78rem; color: var(--muted); }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .sw { width: 10px; height: 10px; border-radius: 3px; }
  .chart-scroll { overflow-x: auto; }
  #kchart { display: block; width: 100%; height: auto; }
  .tooltip { position: fixed; z-index: 10; pointer-events: none; display: none; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; font-size: 0.8rem; min-width: 170px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4); }
  .tooltip .t-title { font-weight: 700; margin-bottom: 5px; }
  .tooltip .row { display: flex; justify-content: space-between; gap: 14px; color: var(--muted); }
  .tooltip .row b { color: var(--text); font-family: var(--mono); font-weight: 500; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.83rem; white-space: nowrap; }
  th { text-align: right; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--muted); padding: 5px 10px 7px; border-bottom: 1px solid var(--border); }
  th:first-child { text-align: left; padding-left: 0; }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--muted); text-align: right;
    font-family: var(--mono); font-size: 0.8rem; }
  td:first-child { text-align: left; color: var(--text); font-family: var(--font); font-weight: 600; padding-left: 0; }
  tr:last-child td { border-bottom: none; }
  .flag { font-size: 0.65rem; color: var(--amber); font-family: var(--font); }
  .footer-note { color: var(--muted); font-size: 0.78rem; margin-top: 24px; line-height: 1.6; opacity: 0.85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="greeting">
      <h1>Monthly <span class="accent">KPIs</span></h1>
      <p id="asof">Loading…</p>
    </div>
    <nav><a href="index.html">← Mission Control</a><a href="finance.html">Financial Command</a></nav>
  </header>

  <div class="tiles" id="tiles"></div>

  <div class="panel" style="margin-bottom:18px">
    <h2>Growth funnel by month</h2>
    <div class="legend">
      <span><span class="sw" style="background:var(--s1)"></span>New members</span>
      <span><span class="sw" style="background:var(--s2)"></span>TRT initial consults</span>
      <span><span class="sw" style="background:var(--s3)"></span>Peptide initial consults</span>
    </div>
    <div class="chart-scroll"><svg id="kchart" viewBox="0 0 640 250" role="img" aria-label="Monthly new members, TRT initial consults, and peptide initial consults"></svg></div>
    <div class="sub">Completed consults only. Current month is partial (dashed).</div>
  </div>

  <div class="panel">
    <h2>All KPIs by month</h2>
    <div class="table-scroll"><table id="ktable"></table></div>
  </div>

  <p class="footer-note" id="basis"></p>
</div>
<div class="tooltip" id="tip"></div>

<script src="data/kpis.js"></script>
<script>
(function () {
  var D = window.KPIS;
  var $ = function (id) { return document.getElementById(id); };
  if (!D) { $('asof').textContent = 'No snapshot — run: node warehouse/kpi_snapshot.mjs in AtlasClaude.'; return; }
  var M = D.months;
  $('asof').textContent = 'Both centers combined · data through ' + D.as_of + ' · snapshot ' + D.generated_at.slice(0, 10);

  var cur = M[M.length - 1], prev = M[M.length - 2] || {};
  var tiles = [
    { t: 'New members · ' + cur.m + (cur.partial ? ' MTD' : ''), v: cur.new_members, s: prev.m + ': ' + prev.new_members + ' · NAD+ new: ' + cur.new_nad },
    { t: 'Initial consults · MTD', v: cur.initials_total, s: 'TRT ' + cur.trt + ' · peptide ' + cur.peptide + ' · telehealth ' + cur.initials_telehealth + ' of them' },
    { t: 'Consult → member', v: (cur.consult_to_member ?? '—') + '%', s: prev.m + ': ' + (prev.consult_to_member ?? '—') + '% (joins ÷ completed initials, same month)' },
    { t: 'Cancellation requests', v: cur.cancel_requests, s: prev.m + ': ' + prev.cancel_requests + ' · form submissions at either center' }
  ];
  tiles.forEach(function (t) {
    var d = document.createElement('div'); d.className = 'panel';
    d.innerHTML = '<h2>' + t.t + '</h2><div class="big">' + t.v + '</div><div class="sub">' + t.s + '</div>';
    $('tiles').appendChild(d);
  });

  // ---- table (newest first) ----
  var cols = [
    ['Month', function (r) { return r.m + (r.partial ? ' <span class="flag">MTD</span>' : ''); }],
    ['Leads', function (r) { return r.leads + (r.leads_flag ? ' <span class="flag">' + r.leads_flag + '</span>' : ''); }],
    ['TRT init', function (r) { return r.trt; }],
    ['Peptide init', function (r) { return r.peptide; }],
    ['Weight loss', function (r) { return r.weight; }],
    ["Men's health", function (r) { return r.mens; }],
    ['Initials total', function (r) { return r.initials_total; }],
    ['Telehealth', function (r) { return r.initials_telehealth; }],
    ['New members', function (r) { return r.new_members + (r.members_flag ? ' <span class="flag">' + r.members_flag + '</span>' : ''); }],
    ['New NAD+', function (r) { return r.new_nad; }],
    ['Consult→member', function (r) { return (r.consult_to_member ?? '—') + '%'; }],
    ['Cancel req', function (r) { return r.cancel_requests; }],
    ['Appts done', function (r) { return r.appts_completed; }]
  ];
  $('ktable').innerHTML = '<thead><tr>' + cols.map(function (c) { return '<th>' + c[0] + '</th>'; }).join('') + '</tr></thead><tbody>' +
    M.slice().reverse().map(function (r) {
      return '<tr>' + cols.map(function (c) { return '<td>' + c[1](r) + '</td>'; }).join('') + '</tr>';
    }).join('') + '</tbody>';
  $('basis').textContent = D.notes + ' Generated ' + D.generated_at + '.';

  // ---- line chart ----
  var svg = $('kchart'), tip = $('tip'), NS = 'http://www.w3.org/2000/svg';
  var W = 640, H = 250, padL = 34, padR = 62, padT = 16, padB = 26;
  var plotW = W - padL - padR, plotH = H - padT - padB;
  var css = getComputedStyle(document.documentElement);
  var v = function (n) { return css.getPropertyValue(n).trim(); };
  var series = [
    { key: 'new_members', label: 'Members', color: v('--s1') },
    { key: 'trt', label: 'TRT', color: v('--s2') },
    { key: 'peptide', label: 'Peptide', color: v('--s3') }
  ];
  // chart starts after the Zenoti-migration months (table still shows them)
  var M0 = M;
  M = M.filter(function (r) { return !r.members_flag; });
  var maxV = 10;
  M.forEach(function (r) { series.forEach(function (s) { if (r[s.key] > maxV) maxV = r[s.key]; }); });
  maxV = Math.ceil(maxV * 1.15 / 10) * 10;
  var x = function (i) { return padL + (M.length === 1 ? plotW / 2 : (plotW * i) / (M.length - 1)); };
  var y = function (val) { return padT + plotH - (val / maxV) * plotH; };
  var el = function (tag, attrs) { var e = document.createElementNS(NS, tag); for (var k in attrs) e.setAttribute(k, attrs[k]); svg.appendChild(e); return e; };
  for (var g = 0; g <= maxV; g += maxV > 60 ? 20 : 10) {
    el('line', { x1: padL, x2: W - padR, y1: y(g), y2: y(g), stroke: g === 0 ? v('--border') : 'rgba(31,41,55,0.55)', 'stroke-width': 1 });
    if (g > 0) el('text', { x: padL - 6, y: y(g) + 4, 'text-anchor': 'end', 'font-size': 10, fill: v('--muted') }).textContent = g;
  }
  M.forEach(function (r, i) {
    if (i % 2 === 0 || r.partial) {
      el('text', { x: x(i), y: H - 8, 'text-anchor': 'middle', 'font-size': 10, fill: v('--muted'), 'font-weight': r.partial ? 700 : 400 })
        .textContent = r.m.slice(5) === '01' || i === 0 ? r.m : r.m.slice(5);
    }
  });
  series.forEach(function (s) {
    var solid = M.filter(function (r) { return !r.partial; });
    var pts = solid.map(function (r, i) { return x(i) + ',' + y(r[s.key]); }).join(' ');
    el('polyline', { points: pts, fill: 'none', stroke: s.color, 'stroke-width': 2, 'stroke-linejoin': 'round' });
    if (M[M.length - 1].partial && M.length > 1) {
      var i0 = M.length - 2, i1 = M.length - 1;
      el('line', { x1: x(i0), y1: y(M[i0][s.key]), x2: x(i1), y2: y(M[i1][s.key]), stroke: s.color, 'stroke-width': 2, 'stroke-dasharray': '4 4' });
    }
    var last = M[M.length - 1];
    el('circle', { cx: x(M.length - 1), cy: y(last[s.key]), r: 3.5, fill: s.color });
  });
  // direct labels at line ends, staggered so they never collide
  var ends = series.map(function (s) { return { s: s, y: y(M[M.length - 1][s.key]) }; })
    .sort(function (a, b) { return a.y - b.y; });
  for (var i = 1; i < ends.length; i++) if (ends[i].y - ends[i - 1].y < 13) ends[i].y = ends[i - 1].y + 13;
  ends.forEach(function (e) {
    el('text', { x: x(M.length - 1) + 7, y: e.y + 4, 'font-size': 10.5, 'font-weight': 700, fill: e.s.color }).textContent = e.s.label;
  });
  // hover: nearest-month column
  M.forEach(function (r, i) {
    var hw = plotW / Math.max(M.length - 1, 1);
    var hit = el('rect', { x: x(i) - hw / 2, y: padT, width: hw, height: plotH, fill: 'transparent' });
    hit.addEventListener('mousemove', function (ev) {
      tip.innerHTML = '<div class="t-title">' + r.m + (r.partial ? ' · MTD' : '') + '</div>' +
        '<div class="row"><span>New members</span><b>' + r.new_members + '</b></div>' +
        '<div class="row"><span>TRT initials</span><b>' + r.trt + '</b></div>' +
        '<div class="row"><span>Peptide initials</span><b>' + r.peptide + '</b></div>' +
        '<div class="row"><span>Leads</span><b>' + r.leads + '</b></div>' +
        '<div class="row"><span>Cancel requests</span><b>' + r.cancel_requests + '</b></div>';
      tip.style.display = 'block';
      tip.style.left = Math.min(ev.clientX + 14, window.innerWidth - tip.offsetWidth - 10) + 'px';
      tip.style.top = (ev.clientY + 14) + 'px';
    });
    hit.addEventListener('mouseleave', function () { tip.style.display = 'none'; });
  });
})();
</script>
</body>
</html>
